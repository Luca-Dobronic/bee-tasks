<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>CH Consult B-BBEE — Board</title>
<style>
  :root{
    --bg:#0f0f11; --panel:#16161a; --panel-2:#1b1b20; --line:#2a2a31;
    --ink:#e7e7ea; --ink-dim:#9a9aa4; --ink-faint:#6c6c78;
    --accent:#e8d44d;
    --review:#5b8cff; --progress:#e0a53b; --pending:#8a8a96; --done:#3fbf6b;
    --radius:14px;
    --mono:'SFMono-Regular',ui-monospace,'JetBrains Mono','Menlo',Consolas,monospace;
  }
  *{box-sizing:border-box}
  html,body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--mono);-webkit-font-smoothing:antialiased}
  body{padding:0 0 88px}
  .wrap{max-width:1100px;margin:0 auto;padding:0 20px}

  header{position:sticky;top:0;z-index:40;background:linear-gradient(var(--bg),rgba(15,15,17,.85));
    border-bottom:1px solid var(--line);backdrop-filter:blur(8px)}
  .topbar{display:flex;align-items:center;gap:16px;height:64px}
  .brand{font-weight:800;letter-spacing:.14em;font-size:15px;color:var(--ink-dim)}
  .brand b{color:var(--ink)}
  .sync{margin-left:auto;display:flex;align-items:center;gap:8px;font-size:12px;color:var(--ink-dim)}
  .dot{width:8px;height:8px;border-radius:50%;background:var(--accent);animation:pulse 1.8s infinite}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(232,212,77,.5)}70%{box-shadow:0 0 0 7px rgba(232,212,77,0)}100%{box-shadow:0 0 0 0 rgba(232,212,77,0)}}
  .nav{display:flex;gap:4px}
  .nav button{font-family:var(--mono);font-size:12px;letter-spacing:.08em;background:transparent;color:var(--ink-dim);
    border:1px solid transparent;padding:8px 12px;border-radius:9px;cursor:pointer}
  .nav button.active{background:var(--accent);color:#111;font-weight:700}
  @media(max-width:720px){.nav{display:none}.brand{font-size:13px}}

  .head{display:flex;align-items:flex-end;justify-content:space-between;margin:26px 0 18px}
  h1{font-size:34px;letter-spacing:.06em;margin:0;color:var(--accent);font-weight:800}
  .sub{color:var(--ink-faint);font-size:12px;letter-spacing:.12em;margin-top:6px}
  .progress{text-align:right}
  .progress .bar{width:200px;height:4px;border-radius:99px;background:var(--line);overflow:hidden;margin-bottom:6px;margin-left:auto}
  .progress .bar i{display:block;height:100%;background:var(--done);width:0;transition:width .5s}
  .progress span{font-size:12px;color:var(--ink-dim)}

  .search{display:flex;gap:8px;margin-bottom:18px}
  .search input{background:var(--panel);border:1px solid var(--line);border-radius:99px;color:var(--ink);
    font-family:var(--mono);font-size:13px;padding:10px 16px;flex:1;min-width:0}
  .search input::placeholder{color:var(--ink-faint)}

  /* ---------- client group ---------- */
  .client{margin-bottom:24px;border:1px solid var(--line);border-radius:14px;overflow:hidden}
  .client-hd{display:flex;align-items:center;gap:12px;padding:14px 18px;background:var(--panel-2);cursor:pointer}
  .client-hd .chev{color:var(--ink-faint);transition:transform .15s;font-size:12px}
  .client.collapsed .chev{transform:rotate(-90deg)}
  .client-hd h2{font-size:17px;margin:0;letter-spacing:.02em}
  .client-hd .cbar{flex:1;height:5px;border-radius:99px;background:var(--line);overflow:hidden;max-width:220px;margin-left:auto}
  .client-hd .cbar i{display:block;height:100%;background:var(--done);width:0;transition:width .4s}
  .client-hd .cpct{font-size:11px;color:var(--ink-dim);min-width:70px;text-align:right}
  .client.collapsed .pillars{display:none}
  .pillars{padding:6px}
  @media(max-width:720px){.client-hd .cbar{display:none}}

  /* ---------- pillar row ---------- */
  .pillar{border-radius:10px;margin:4px}
  .pillar-hd{display:flex;align-items:center;gap:12px;padding:12px 14px;cursor:pointer;border-radius:10px}
  .pillar-hd:hover{background:var(--panel-2)}
  .pillar .exp{color:var(--ink-faint);font-size:11px;transition:transform .15s}
  .pillar.open .exp{transform:rotate(90deg)}
  .pillar-name{flex:1;font-size:14px;letter-spacing:.01em}
  .pillar-name .n{color:var(--ink-faint);margin-right:8px}
  .pill-ico{margin-right:7px}
  .status{font-size:11px;letter-spacing:.04em;padding:5px 11px;border-radius:99px;border:1px solid var(--line);cursor:pointer;white-space:nowrap}
  .status.s-notstarted{color:var(--pending)}
  .status.s-inprogress{color:var(--progress);border-color:rgba(224,165,59,.45)}
  .status.s-review{color:var(--review);border-color:rgba(91,140,255,.45)}
  .status.s-approved{color:var(--done);border-color:rgba(63,191,107,.45)}
  .cc{font-size:11px;color:var(--ink-faint);border:1px solid var(--line);border-radius:99px;padding:3px 9px;min-width:34px;text-align:center}

  /* ---------- threaded comments ---------- */
  .thread{display:none;padding:6px 14px 16px 40px}
  .pillar.open .thread{display:block}
  .cmt{margin:12px 0}
  .cmt-head{display:flex;align-items:center;gap:9px}
  .num{font-weight:800;color:var(--accent);font-size:12px;font-variant-numeric:tabular-nums}
  .who{font-size:13px;font-weight:700}
  .when{font-size:11px;color:var(--ink-faint)}
  .cmt-text{font-size:13px;color:var(--ink-dim);margin:5px 0 0 33px;line-height:1.5}
  .reply-link{background:none;border:none;color:var(--ink-faint);font-family:var(--mono);font-size:11px;
    letter-spacing:.06em;cursor:pointer;padding:3px 0 0 33px}
  .reply-link:hover{color:var(--accent)}
  .children{margin-left:16px;padding-left:14px;border-left:2px solid var(--line)}
  .replybox,.addcmt{display:flex;gap:8px;align-items:center;margin:8px 0 0 33px}
  .addcmt{margin:14px 0 0 0;padding-top:12px;border-top:1px solid var(--line)}
  .replybox input,.addcmt input{flex:1;background:var(--panel-2);border:1px solid var(--line);border-radius:9px;
    color:var(--ink);font-family:var(--mono);font-size:13px;padding:9px 12px}
  .replybox button,.addcmt button{background:var(--accent);color:#111;border:none;border-radius:9px;
    font-family:var(--mono);font-weight:700;padding:0 14px;height:36px;cursor:pointer}
  .none{font-size:12px;color:var(--ink-faint);margin-left:0}

  .av{width:24px;height:24px;border-radius:50%;flex:0 0 auto;display:inline-flex;align-items:center;
    justify-content:center;font-size:10px;font-weight:800;color:#111;border:1px solid rgba(255,255,255,.12)}
  .av.luca{background:linear-gradient(135deg,#4bd07a,#2e9c56)}
  .av.edrich{background:linear-gradient(135deg,#e8d44d,#c9a91f)}
  .av img{width:100%;height:100%;border-radius:50%;object-fit:cover}

  /* ---------- alerts ---------- */
  .bell{position:relative;background:transparent;border:1px solid var(--line);border-radius:10px;
    font-size:15px;padding:6px 10px;cursor:pointer;line-height:1}
  .bell .bcount{position:absolute;top:-7px;right:-7px;min-width:18px;height:18px;padding:0 4px;border-radius:99px;
    background:#f0a020;color:#111;font-size:10px;font-weight:800;display:flex;align-items:center;justify-content:center}
  .bell.none-active{opacity:.5}
  .bell.none-active .bcount{display:none}

  .alerts{background:linear-gradient(180deg,rgba(240,160,32,.12),transparent);
    border:1px solid rgba(240,160,32,.4);border-radius:var(--radius);padding:14px 18px;margin-bottom:18px}
  .alerts h3{margin:0 0 10px;font-size:12px;letter-spacing:.12em;color:#f0a020}
  .alerts ul{list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:8px}
  .alerts li{display:flex;align-items:center;gap:10px;font-size:13px;background:var(--panel);
    border:1px solid var(--line);border-radius:9px;padding:9px 12px}
  .alerts .a-main{flex:1;cursor:pointer;min-width:0}
  .alerts .a-main:hover{color:var(--accent)}
  .alerts .a-loc{color:#f0a020;font-weight:700}
  .alerts .a-snip{color:var(--ink-dim)}
  .alerts .resolve{background:transparent;border:1px solid var(--line);color:var(--ink-faint);
    font-family:var(--mono);font-size:11px;padding:5px 10px;border-radius:8px;cursor:pointer;white-space:nowrap}
  .alerts .resolve:hover{color:var(--done);border-color:var(--done)}
  .alerts.clear{border-color:rgba(63,191,107,.35);background:linear-gradient(180deg,rgba(63,191,107,.08),transparent)}
  .alerts.clear h3{color:var(--done)}

  /* flagged comment */
  .cmt.flagged{background:rgba(240,160,32,.07);border-left:2px solid #f0a020;padding:6px 0 6px 10px;border-radius:6px}
  .flagtag{font-size:10px;letter-spacing:.06em;color:#111;background:#f0a020;border-radius:6px;padding:2px 7px;font-weight:800;margin-left:6px}
  .flag-btn{background:none;border:none;color:var(--ink-faint);font-family:var(--mono);font-size:11px;
    letter-spacing:.06em;cursor:pointer;padding:3px 0 0 8px}
  .flag-btn.on{color:#f0a020}
  .flag-btn:hover{color:#f0a020}
  .del-btn{background:none;border:none;color:var(--ink-faint);font-family:var(--mono);font-size:11px;
    letter-spacing:.06em;cursor:pointer;padding:3px 0 0 8px}
  .del-btn:hover{color:#ef4d5a}
  .del-confirm{display:inline-flex;align-items:center;gap:7px;font-size:11px;color:#ef4d5a;
    letter-spacing:.02em;padding:3px 0 0 8px}
  .del-confirm button{font-family:var(--mono);font-size:11px;border-radius:6px;cursor:pointer;padding:2px 10px}
  .del-confirm .yes{background:#ef4d5a;color:#fff;border:none;font-weight:700}
  .del-confirm .yes:hover{background:#ff5f6b}
  .del-confirm .no{background:transparent;color:var(--ink-faint);border:1px solid var(--line)}
  .del-confirm .no:hover{color:var(--ink);border-color:var(--ink-faint)}

  /* undo toast */
  .undo-toast{position:fixed;left:50%;bottom:24px;z-index:60;transform:translateX(-50%) translateY(20px);
    background:var(--panel);border:1px solid var(--line);border-radius:11px;padding:10px 12px 10px 16px;
    display:flex;align-items:center;gap:14px;font-size:13px;color:var(--ink-dim);font-family:var(--mono);
    box-shadow:0 10px 30px rgba(0,0,0,.4);opacity:0;pointer-events:none;transition:opacity .2s,transform .2s}
  .undo-toast.show{opacity:1;transform:translateX(-50%) translateY(0);pointer-events:auto}
  .undo-toast button{background:var(--accent);color:#111;border:none;border-radius:8px;font-family:var(--mono);
    font-weight:700;font-size:12px;padding:7px 14px;cursor:pointer}

  /* row badges */
  .a-dot{width:8px;height:8px;border-radius:50%;background:#f0a020;flex:0 0 auto;display:inline-block}
  .a-badge{font-size:10px;font-weight:800;color:#111;background:#f0a020;border-radius:99px;padding:2px 8px}

  /* ---------- dashboard ---------- */
  .d-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:18px}
  .d-stat{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:18px 20px}
  .d-stat b{display:block;font-size:30px;line-height:1.1}
  .d-stat small{color:var(--ink-faint);font-size:11px;letter-spacing:.12em}
  .d-stat.g b{color:var(--done)} .d-stat.o b{color:#f0a020} .d-stat.r b{color:var(--review)}
  @media(max-width:720px){.d-stats{grid-template-columns:repeat(2,1fr)}}

  .d-grid{display:grid;grid-template-columns:280px 1fr;gap:14px;margin-bottom:14px}
  @media(max-width:820px){.d-grid{grid-template-columns:1fr}}
  .d-card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:18px 20px}
  .d-card h3{margin:0 0 14px;font-size:12px;letter-spacing:.13em;color:var(--ink-dim)}

  .donut-wrap{display:flex;flex-direction:column;align-items:center;gap:12px}
  .donut{position:relative;width:170px;height:170px}
  .donut svg{transform:rotate(-90deg)}
  .donut .mid{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
  .donut .mid b{font-size:32px;color:var(--done)}
  .donut .mid small{font-size:10px;letter-spacing:.1em;color:var(--ink-faint)}
  .legend{display:flex;gap:16px;font-size:11px;color:var(--ink-dim)}
  .legend i{display:inline-block;width:10px;height:10px;border-radius:3px;margin-right:6px;vertical-align:-1px}

  .hbar{display:flex;align-items:center;gap:10px;margin:9px 0}
  .hbar .lbl{width:190px;font-size:12px;color:var(--ink-dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .hbar .trk{flex:1;height:9px;border-radius:99px;background:var(--line);overflow:hidden;display:flex}
  .hbar .trk i{display:block;height:100%}
  .hbar .val{font-size:11px;color:var(--ink-faint);min-width:44px;text-align:right;font-variant-numeric:tabular-nums}
  @media(max-width:720px){.hbar .lbl{width:120px;font-size:11px}}

  .d-out{list-style:none;margin:0;padding:0}
  .d-out li{display:flex;align-items:center;gap:10px;padding:9px 12px;border:1px solid var(--line);
    border-radius:9px;margin-bottom:8px;font-size:13px;cursor:pointer;background:var(--panel-2)}
  .d-out li:hover{border-color:var(--accent)}
  .d-out .c{flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .d-out .c b{color:var(--ink)}
  .d-out .st{font-size:10px;letter-spacing:.05em;padding:4px 9px;border-radius:99px;border:1px solid var(--line);white-space:nowrap}
  .d-out .resolve{background:transparent;border:1px solid var(--line);color:var(--ink-faint);
    font-family:var(--mono);font-size:11px;padding:5px 10px;border-radius:8px;cursor:pointer;white-space:nowrap}
  .d-out .resolve:hover{color:var(--done);border-color:var(--done)}

  /* ---------- person filter + assignee + due ---------- */
  .me{display:flex;gap:6px;align-items:center;margin-left:12px}
  .me .plabel{font-size:10px;letter-spacing:.1em;color:var(--ink-faint)}
  .me .pchip{padding:4px 8px}
  @media(max-width:720px){.me .plabel{display:none}}
  .cinfo{font-size:11px;color:var(--ink-faint);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:220px}
  .drv{text-decoration:none;font-size:14px}
  .gear{background:transparent;border:1px solid var(--line);color:var(--ink-faint);border-radius:8px;
    font-size:13px;padding:4px 9px;cursor:pointer}
  .gear:hover{color:var(--accent);border-color:var(--accent)}
  .csettings{padding:14px;border-bottom:1px solid var(--line);background:var(--panel-2)}
  @media(max-width:720px){.cinfo{display:none}}
  .pfilter{display:flex;gap:8px;margin-bottom:16px;align-items:center}
  .pfilter .plabel{font-size:11px;letter-spacing:.1em;color:var(--ink-faint)}
  .pchip{display:flex;align-items:center;gap:7px;font-size:12px;background:var(--panel);border:1px solid var(--line);
    color:var(--ink-dim);padding:7px 13px;border-radius:99px;cursor:pointer;font-family:var(--mono)}
  .pchip.active{border-color:var(--accent);color:var(--accent)}
  .who-chip{display:inline-flex;align-items:center;gap:5px;font-size:10px;letter-spacing:.04em;
    padding:4px 9px;border-radius:99px;border:1px solid var(--line);color:var(--ink-dim);cursor:pointer;white-space:nowrap}
  .who-chip:hover{border-color:var(--accent)}
  .tag{font-size:11px;letter-spacing:.05em;padding:4px 9px;border-radius:7px;border:1px solid var(--line);color:var(--ink-dim);white-space:nowrap}
  .tag.due-over{color:#fff;background:#ef4d5a;border-color:#ef4d5a;font-weight:700}
  .tag.due-soon{color:#111;background:#e0a53b;border-color:#e0a53b;font-weight:700}
  .tag.due-ok{color:var(--ink-faint)}
  .duebox{display:flex;align-items:center;gap:10px;margin:0 0 12px;font-size:12px;color:var(--ink-faint)}
  .duebox input[type=date]{background:var(--panel-2);border:1px solid var(--line);border-radius:8px;
    color:var(--ink);font-family:var(--mono);font-size:12px;padding:6px 10px;color-scheme:dark}
  .duebox .clr{background:none;border:none;color:var(--ink-faint);font-family:var(--mono);font-size:11px;cursor:pointer}
  .duebox .clr:hover{color:#ef4d5a}
  @media(max-width:720px){.who-chip .wt{display:none}}

  /* ---------- assign form / done / log ---------- */
  .frm{display:grid;grid-template-columns:1fr 1fr;gap:12px 14px;margin-bottom:14px}
  .frm label{display:flex;flex-direction:column;gap:6px;font-size:11px;letter-spacing:.08em;color:var(--ink-faint)}
  .frm label.full{grid-column:1/-1}
  .frm select,.frm input,.frm textarea{background:var(--panel-2);border:1px solid var(--line);border-radius:9px;
    color:var(--ink);font-family:var(--mono);font-size:13px;padding:9px 12px;color-scheme:dark}
  .frm textarea{resize:vertical}
  .btn-primary{background:var(--accent);color:#111;border:none;border-radius:9px;font-family:var(--mono);font-weight:700;padding:10px 18px;cursor:pointer}
  .btn-ghost{background:transparent;color:var(--ink-dim);border:1px solid var(--line);border-radius:9px;font-family:var(--mono);padding:10px 16px;cursor:pointer}
  .btn-ghost:hover{border-color:var(--accent);color:var(--accent)}
  .preview{white-space:pre-wrap;font-size:12px;color:var(--ink-dim);background:var(--panel-2);border:1px solid var(--line);
    border-radius:10px;padding:12px 14px;margin-top:12px;min-height:0}
  .preview:empty{display:none}
  @media(max-width:720px){.frm{grid-template-columns:1fr}}

  .loglist{list-style:none;margin:0;padding:0}
  .loglist li{display:flex;align-items:center;gap:12px;padding:9px 4px;border-bottom:1px solid var(--line);font-size:13px}
  .loglist li:last-child{border-bottom:none}
  .lg-when{color:var(--ink-faint);font-size:11px;min-width:96px}
  .lg-act{color:var(--accent);font-size:11px;letter-spacing:.05em;min-width:78px}
  .lg-det{color:var(--ink-dim);flex:1;min-width:0}
  @media(max-width:720px){.lg-when{min-width:0;font-size:10px}.lg-act{min-width:0}}

  .botnav{position:fixed;left:0;right:0;bottom:0;z-index:50;display:none;
    background:rgba(20,20,24,.96);border-top:1px solid var(--line);backdrop-filter:blur(10px);
    padding:8px 8px calc(8px + env(safe-area-inset-bottom))}
  .botnav div{display:flex;justify-content:space-around}
  .botnav button{flex:1;background:transparent;border:none;color:var(--ink-faint);font-family:var(--mono);
    font-size:10px;letter-spacing:.06em;padding:6px 2px;cursor:pointer;display:flex;flex-direction:column;gap:4px;align-items:center}
  .botnav button .ic{font-size:16px}
  .botnav button.active{color:var(--accent)}
  @media(max-width:720px){.botnav{display:block}}
  @media(prefers-reduced-motion:reduce){*,*::before,*::after{animation:none!important;transition:none!important}}
</style>
</head>
<body>
<header>
  <div class="wrap topbar">
    <div class="brand">CH CONSULT <b>B-BBEE</b></div>
    <div class="me" id="meToggle"></div>
    <div class="sync"><span class="dot" id="syncDot"></span> <span id="syncLabel">offline (demo data)</span>
      <button class="pchip" style="padding:5px 10px" onclick="loadRemote()" title="Refresh from Sheet">⟳</button></div>
    <button class="bell" id="bell" onclick="scrollAlerts()" title="Alerts">
      🔔<span class="bcount" id="bellCount">0</span>
    </button>
    <nav class="nav">
      <button id="nav-dash" onclick="setView('dash')">DASHBOARD</button><button id="nav-board" class="active" onclick="setView('board')">BOARD</button>
      <button id="nav-assign" onclick="setView('assign')">ASSIGN</button><button id="nav-done" onclick="setView('done')">DONE</button><button id="nav-log" onclick="setView('log')">LOG</button>
    </nav>
  </div>
</header>

<main class="wrap">
  <div id="connectBox" class="d-card" style="display:none;margin:20px 0;border-color:rgba(232,212,77,.4)">
    <h3>CONNECT TO GOOGLE SHEET</h3>
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      <input id="scriptUrl" placeholder="Paste your Apps Script /exec URL…" style="flex:1;min-width:220px;background:var(--panel-2);border:1px solid var(--line);border-radius:9px;color:var(--ink);font-family:var(--mono);font-size:13px;padding:10px 12px">
      <button onclick="connect()" style="background:var(--accent);color:#111;border:none;border-radius:9px;font-family:var(--mono);font-weight:700;padding:0 18px;cursor:pointer">Connect</button>
    </div>
    <div class="none" style="margin-top:8px">Both you and Luca paste the same URL once. Until connected, the app runs on demo data.</div>
  </div>
  <div class="head">
    <div><h1 id="viewTitle">TASK BOARD</h1><div class="sub" id="viewSub">CLIENT → PILLARS → PER-ELEMENT COMMENT THREADS</div></div>
    <div class="progress"><div class="bar"><i id="progBar"></i></div><span id="progText">0% approved</span></div>
  </div>
  <div id="alerts"></div>
  <div class="pfilter" id="pfilter"></div>
  <div id="dash" style="display:none"></div>
  <div id="assignview" style="display:none"></div>

<script>
/* =====================================================================
   SYNC LAYER — Google Sheets via Apps Script
   1) Deploy the provided Code.gs as a Web App (execute as you, access: anyone with link)
   2) Paste the /exec URL below OR use the Connect box on first load
   ===================================================================== */
let SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxbLOZEmCZq8JvGYHNRmchhTKu1SZfdiKEZRsil7QeGERY-SlZ3RqW_Agb9kZrbEMjm/exec";                   // <- optionally hard-code your Apps Script /exec URL here
try{ if(!SCRIPT_URL) SCRIPT_URL = localStorage.getItem("bee_script_url")||""; }catch(e){}
let SYNC_STATE = "offline";               // offline | syncing | live | error

function setSync(s){
  SYNC_STATE=s;
  const el=document.getElementById("syncLabel"); if(!el) return;
  el.textContent = s==="live" ? "live sync" : s==="syncing" ? "syncing…" : s==="error" ? "sync error — retry" : "offline (demo data)";
  const dot=document.getElementById("syncDot"); if(dot) dot.style.background = s==="live"?"var(--done)":s==="error"?"#ef4d5a":"var(--accent)";
}
function connect(){
  const v=(document.getElementById("scriptUrl").value||"").trim();
  if(!/^https:\/\/script\.google\.com\/.+\/exec/.test(v)){ alert("That doesn't look like an Apps Script /exec URL."); return; }
  SCRIPT_URL=v; try{ localStorage.setItem("bee_script_url",v); }catch(e){}
  document.getElementById("connectBox").style.display="none";
  loadRemote();
}
function showConnect(){
  const b=document.getElementById("connectBox");
  b.style.display = SCRIPT_URL ? "none" : "";
}

/* ---- serialize state <-> sheet rows ---- */
function stateToPayload(){
  const elements=[], comments=[];
  CLIENTS.forEach(c=>PILLARS.forEach(name=>{
    const el=c.p[name];
    elements.push({client:c.name,pillar:name,status:el.status,who:el.who,due:el.due||""});
    const walk=(list,parentId)=>list.forEach(x=>{
      comments.push({id:x.id,client:c.name,pillar:name,parentId:parentId||"",who:x.who,when:x.when,text:x.text,flag:!!x.flag,deleted:!!x.deleted});
      walk(x.replies,x.id);
    });
    walk(el.comments,"");
  }));
  const clientinfo=CLIENTS.map(c=>Object.assign({client:c.name},clientInfo(c)));
  return {elements,comments,log:LOG,clientinfo,archive:ARCHIVE};
}
function payloadToState(data){
  if(!data||!data.elements) return;
  if(Array.isArray(data.log)) LOG=data.log;
  if(Array.isArray(data.archive)) ARCHIVE=data.archive;
  const byClient={};
  data.elements.forEach(r=>{
    if(!byClient[r.client]) byClient[r.client]=init({});
    if(byClient[r.client][r.pillar]){
      byClient[r.client][r.pillar].status=r.status||"Not started";
      byClient[r.client][r.pillar].who=r.who||"Both";
      byClient[r.client][r.pillar].due=r.due||"";
    }
  });
  const nodes={};
  (data.comments||[]).forEach(r=>{ nodes[r.id]={id:r.id,who:r.who,when:r.when,text:r.text,flag:String(r.flag)==="true"||r.flag===true,deleted:String(r.deleted)==="true"||r.deleted===true,replies:[]}; if(+r.id>=nextCid) nextCid=+r.id+1; });
  (data.comments||[]).forEach(r=>{
    const n=nodes[r.id];
    if(r.parentId && nodes[r.parentId]) nodes[r.parentId].replies.push(n);
    else if(byClient[r.client] && byClient[r.client][r.pillar]) byClient[r.client][r.pillar].comments.push(n);
  });
  const infoBy={}; (data.clientinfo||[]).forEach(r=>{ infoBy[r.client]={period:r.period||"",fye:r.fye||"",type:r.type||"",sector:r.sector||"",drive:r.drive||""}; });
  CLIENTS = Object.keys(byClient).map(name=>({name,p:byClient[name],info:infoBy[name]||INFO_DEFAULT()}));
}

/* ---- network ---- */
async function loadRemote(){
  if(!SCRIPT_URL){ setSync("offline"); return; }
  setSync("syncing");
  try{
    const r=await fetch(SCRIPT_URL); const data=await r.json();
    if(data && data.elements && data.elements.length) payloadToState(data);
    else await saveRemote();            // first run: seed the sheet from current state
    setSync("live"); render();
  }catch(e){ console.error(e); setSync("error"); }
}
let saveTimer=null;
function queueSave(){                    // debounce rapid edits into one write
  if(!SCRIPT_URL){ setSync("error"); console.warn("queueSave: SCRIPT_URL is empty, save skipped"); return; }
  clearTimeout(saveTimer); saveTimer=setTimeout(saveRemote,900);
}
async function saveRemote(){
  if(!SCRIPT_URL){ setSync("error"); console.warn("saveRemote: SCRIPT_URL is empty, save skipped"); return; }
  setSync("syncing");
  try{
    await fetch(SCRIPT_URL,{method:"POST",headers:{"Content-Type":"text/plain"},body:JSON.stringify(stateToPayload())});
    setSync("live");
  }catch(e){ console.error(e); setSync("error"); }
}
</script>

function countComments(node){ let n=0; node.forEach(c=>{ if(c.deleted)return; n++; n+=countComments(c.replies); }); return n; }
function findNode(list,id){ for(const c of list){ if(c.id==id)return c; const f=findNode(c.replies,id); if(f)return f; } return null; }
const visibleComments = list => list.filter(c=>!c.deleted);

/* ===== ALERTS: auto-flag instruction-style comments, plus manual flags ===== */
const ALERT_WORDS=/\b(please|urgent|asap|action|needs?|must|require[sd]?|kindly|attention|follow[ -]?up|review|deadline|by (mon|tue|wed|thu|fri|today|tomorrow))\b|@edrich|@luca/i;
const isInstruction = t => ALERT_WORDS.test(t||"");
/* condense a flagged comment into a short instruction line */
function summarize(t){
  t=String(t||"").replace(/\s+/g," ").trim();
  let s=t.split(/[.!?\n]/)[0]||t;                       // first sentence
  const m=s.match(/(please|kindly|need to|needs?|must|action|review|send|prepare|pull|reconcile|check|confirm|follow up|update|provide|obtain|request)\b.*/i);
  if(m) s=m[0];                                          // prefer the instruction part
  s=s.trim();
  if(s.length>58) s=s.slice(0,58).trim()+"…";
  return s ? s.charAt(0).toUpperCase()+s.slice(1) : t;
}
function walkFlags(list, ci, pi, out){

}
function countFlags(list){ let n=0; list.forEach(c=>{ if(c.deleted)return; if(c.flag)n++; n+=countFlags(c.replies); }); return n; }

  queueSave(); render();                                   // render FIRST (rebuilds the form)
  document.getElementById("as-preview").textContent=assignPreviewText(f);   // THEN write preview
  document.getElementById("as-note").value="";
  alert("Assigned. It's live on the board and in the log.");
}
function copyAssignPreview(){
  const t=assignPreviewText(assignFields());
  navigator.clipboard && navigator.clipboard.writeText(t);
  document.getElementById("as-preview").textContent=t;
}

/* ===== DONE view ===== */
function renderDone(){
  if(VIEW!=="done") return;
  const done=[], review=[];
  CLIENTS.forEach((c,ci)=>PILLARS.forEach((name,pi)=>{
    if(NON_SCORED.has(name)) return;
    const el=c.p[name];
    if(el.status==="Approved") done.push({ci,pi,client:c.name,pillar:name,who:el.who});
    else if(el.status==="Ready for review") review.push({ci,pi,client:c.name,pillar:name,who:el.who});
  }));
  const row=(o,tag)=>'<li onclick="goPillar('+o.ci+','+o.pi+')">'
    +'<span class="c"><b>'+escHtml(o.client)+'</b> · '+o.pillar+'</span>'
    +'<span class="who-chip">'+(o.who==="Both"?'👥':avatar(o.who))+'<span class="wt">'+o.who+'</span></span>'
    +'<span class="st '+tag+'">'+(tag==="s-approved"?"Approved":"Ready for review")+'</span></li>';
  /* archived periods grouped client+period */
  const groups={};
  ARCHIVE.forEach(r=>{ const k=r.client+" — "+r.period; (groups[k]=groups[k]||{closedOn:r.closedOn,rows:[]}).rows.push(r); });
  const archHtml=Object.keys(groups).map(k=>{
    const g=groups[k];
    const appr=g.rows.filter(r=>r.status==="Approved" && !NON_SCORED.has(r.pillar)).length;
    const scored=g.rows.filter(r=>!NON_SCORED.has(r.pillar)).length;
    return '<li style="cursor:default"><span class="c"><b>'+escHtml(k)+'</b>'
      +' <span style="color:var(--ink-faint)">closed '+escHtml(g.closedOn)+'</span></span>'
      +'<span class="st s-approved">'+appr+'/'+scored+' approved</span></li>';
  }).join("");
  document.getElementById("doneview").innerHTML =
    '<div class="d-stats" style="grid-template-columns:repeat(2,1fr)">'
      +'<div class="d-stat r"><b>'+review.length+'</b><small>READY FOR REVIEW</small></div>'
      +'<div class="d-stat g"><b>'+done.length+'</b><small>APPROVED</small></div>'
    +'</div>'
    +'<div class="d-card" style="margin-bottom:14px"><h3>READY FOR REVIEW — your action</h3><ul class="d-out">'
      +(review.map(o=>row(o,"s-review")).join("")||'<div class="none">Nothing awaiting review.</div>')
    +'</ul></div>'
    +'<div class="d-card" style="margin-bottom:14px"><h3>APPROVED / COMPLETE — current period</h3><ul class="d-out">'
      +(done.map(o=>row(o,"s-approved")).join("")||'<div class="none">No elements approved yet.</div>')
    +'</ul></div>'
    +'<div class="d-card"><h3>ARCHIVE — completed periods</h3><ul class="d-out">'
      +(archHtml||'<div class="none">No archived periods yet. Close one via a client\'s ⚙ settings.</div>')
    +'</ul></div>';
}

/* ===== LOG view ===== */
function renderLog(){
  if(VIEW!=="log") return;
  document.getElementById("logview").innerHTML =
    '<div class="d-card"><h3>ACTIVITY LOG — newest first</h3>'
    +(LOG.length? '<ul class="loglist">'+LOG.map(e=>
        '<li><span class="lg-when">'+escHtml(e.when)+'</span>'
        +'<span class="who-chip">'+(e.who==="Both"?'👥':avatar(e.who))+'<span class="wt">'+escHtml(e.who)+'</span></span>'
        +'<span class="lg-act">'+escHtml(e.action)+'</span>'
        +'<span class="lg-det">'+escHtml(e.detail||"")+'</span></li>').join("")+'</ul>'
      : '<div class="none">No activity logged yet this session.</div>')
    +'</div>';
}

function renderAlerts(){
  const list=allAlerts();
  const bell=document.getElementById("bell"), bc=document.getElementById("bellCount");
  bc.textContent=list.length;
  bell.classList.toggle("none-active", list.length===0);

  const el=document.getElementById("alerts");
  if(!list.length){ el.className="alerts clear"; el.innerHTML='<h3>✓ NO OPEN ALERTS</h3>'; return; }
  el.className="alerts";
  el.innerHTML='<h3>⚑ ALERTS — '+list.length+' need attention</h3><ul>'
    + list.map(a=>{
        return '<li>'
          +'<div class="a-main" onclick="jumpTo('+a.ci+','+a.pi+','+a.id+')">'
            +'<span class="a-loc">'+escHtml(CLIENTS[a.ci].name)+' · '+PILLARS[a.pi]+'</span> — '
            +'<span class="a-snip">'+escHtml(summarize(a.text))+'</span></div>'
          +'<button class="resolve" onclick="resolveFlag('+a.ci+','+a.pi+','+a.id+')">Resolve</button>'
        +'</li>';
      }).join("")
    +'</ul>';
}

function pillarRow(c,ci,name,pi){
  const el=c.p[name];
  const open=pillarOpen[ci+"-"+pi]?"open":"";
  const cnt=countComments(el.comments);
  const flags=countFlags(el.comments);
  const di=dueInfo(el);
  return '<div class="pillar '+open+'">'
    +'<div class="pillar-hd" onclick="togglePillar('+ci+','+pi+')">'
      +'<span class="exp">▶</span>'
      +'<span class="pillar-name"><span class="n">'+(pi+1)+'.</span>'
        +'<span class="pill-ico">'+(PILLAR_ICON[name]||"")+'</span>'+name+'</span>'
      +(flags?'<span class="a-dot" title="'+flags+' need attention"></span>':'')
      +(di?'<span class="tag '+di.cls+'">'+di.txt+'</span>':'')
      +'<span class="who-chip" onclick="event.stopPropagation();cycleWho('+ci+','+pi+')" title="Assignee — click to change">'
        +(el.who==="Both"?'👥':avatar(el.who))+'<span class="wt">'+el.who.toUpperCase()+'</span></span>'
      +'<span class="cc">'+cnt+'</span>'
      +'<span class="status '+SCLASS[el.status]+'" onclick="event.stopPropagation();cycleStatus('+ci+','+pi+')">'+el.status+'</span>'
    +'</div>'
    +'<div class="thread">'
      +'<div class="duebox">📅 Due:'
        +'<input type="date" value="'+(el.due||"")+'" onchange="setDue('+ci+','+pi+',this.value)">'
        +(el.due?'<button class="clr" onclick="setDue('+ci+','+pi+',\'\')">✕ clear</button>':'')
      +'</div>'
      + (visibleComments(el.comments).length ? visibleComments(el.comments).map((n,i)=>renderComment(n,String(i+1),ci,pi)).join("")
                            : '<div class="none">No comments on this element yet.</div>')
      + '<div class="addcmt"><input id="ac-'+ci+'-'+pi+'" placeholder="Comment on '+name+' as '+ME+'…" '
        + 'onkeydown="if(event.key===\'Enter\')addComment('+ci+','+pi+')">'
        + '<button onclick="addComment('+ci+','+pi+')">Post</button></div>'
    +'</div></div>';
}

/* recursive: number like 1, 1.1, 1.1.1 ; each level nested + indented */
function renderComment(node,number,ci,pi){
  let h='<div class="cmt'+(node.flag?" flagged":"")+'" id="cmt-'+node.id+'">'
    +'<div class="cmt-head"><span class="num">'+number+'.</span>'+avatar(node.who)
      +'<span class="who" style="color:'+whoColor(node.who)+'">'+node.who+'</span>'
      +'<span class="when">'+node.when+'</span>'
      +(node.flag?'<span class="flagtag">⚑ NEEDS ATTENTION</span>':'')+'</div>'
    +'<div class="cmt-text">'+escHtml(node.text)+'</div>'
    +'<button class="reply-link" onclick="showReply('+node.id+')">↳ Reply</button>'
    +'<button class="flag-btn'+(node.flag?" on":"")+'" onclick="toggleFlag('+ci+','+pi+','+node.id+')">'
      +(node.flag?"⚑ Resolve":"⚑ Flag")+'</button>'
    +(delConfirmOpen[node.id]
      ? '<span class="del-confirm">Really delete?'
          +'<button class="yes" onclick="confirmDeleteYes('+ci+','+pi+','+node.id+')">Yes</button>'
          +'<button class="no" onclick="confirmDeleteNo('+ci+','+pi+','+node.id+')">No</button>'
        +'</span>'
      : '<button class="del-btn" onclick="askDeleteComment('+ci+','+pi+','+node.id+')">✕ Delete</button>');
  if(replyOpen[node.id]){
    h+='<div class="replybox"><input id="rp-'+node.id+'" placeholder="Reply as '+ME+' to '+number+'…" '
      +'onkeydown="if(event.key===\'Enter\')addReply('+ci+','+pi+','+node.id+')">'
      +'<button onclick="addReply('+ci+','+pi+','+node.id+')">Post</button></div>';
  }
  const vReplies=visibleComments(node.replies);
  if(vReplies.length){
    h+='<div class="children">'
      + vReplies.map((c,i)=>renderComment(c,number+'.'+(i+1),ci,pi)).join("")
      +'</div>';
  }
  return h+'</div>';
}

/* ===== interactions ===== */
function toggleClient(ci){ clientOpen[ci]=!clientOpen[ci]; render(); }
const settingsOpen={};
function toggleSettings(ci){ settingsOpen[ci]=!settingsOpen[ci]; clientOpen[ci]=true; render(); }
function clientSettings(c,ci){
  const inf=clientInfo(c);
  const fld=(lbl,key,ph)=>'<label>'+lbl+'<input id="cs-'+key+'-'+ci+'" value="'+escHtml(inf[key]||"")+'" placeholder="'+ph+'"></label>';
  return '<div class="csettings"><div class="frm" style="margin-bottom:10px">'
    +fld("Period","period","e.g. FYE Feb 2026")
    +fld("Financial year end","fye","e.g. Feb 2026")
    +fld("Scorecard type","type","EME / QSE / Generic")
    +fld("Sector code","sector","Generic / ICT / Construction…")
    +'<label class="full">Google Drive folder link<input id="cs-drive-'+ci+'" value="'+escHtml(inf.drive||"")+'" placeholder="https://drive.google.com/…"></label>'
    +'</div><div style="display:flex;gap:8px;flex-wrap:wrap">'
    +'<button class="btn-primary" onclick="saveClientInfo('+ci+')">Save info</button>'
    +'<button class="btn-ghost" style="border-color:rgba(63,191,107,.5);color:var(--done)" onclick="completePeriod('+ci+')">✓ Complete period &amp; start new</button>'
    +'</div></div>';
}
function saveClientInfo(ci){
  const inf=clientInfo(CLIENTS[ci]);
  ["period","fye","type","sector","drive"].forEach(k=>{
    const el=document.getElementById("cs-"+k+"-"+ci); if(el) inf[k]=(el.value||"").trim();
  });
  logEvent(ME,"Client info", CLIENTS[ci].name+" updated");
  settingsOpen[ci]=false; render(); queueSave();
}
function flattenComments(list,depth){
  return list.map(x=>"  ".repeat(depth)+x.who+" ("+x.when+"): "+x.text
    + (x.replies.length? "\n"+flattenComments(x.replies,depth+1):"")).join("\n");
}
function completePeriod(ci){
  const c=CLIENTS[ci], inf=clientInfo(c);
  const period=(document.getElementById("cs-period-"+ci)||{}).value || inf.period || "Period ending "+new Date().getFullYear();
  if(!confirm("Archive \""+c.name+" — "+period+"\" and reset all elements to Not started?\n\nHistory is kept in the Archive (Done tab).")) return;
  const closedOn=nowStr();
  PILLARS.forEach(name=>{
    const el=c.p[name];
    ARCHIVE.push({client:c.name, period, closedOn, pillar:name, status:el.status,
      who:el.who, due:el.due||"", comments:flattenComments(el.comments,0).slice(0,40000)});
    el.status="Not started"; el.due=""; el.comments=[];
  });
  inf.period="";
  logEvent(ME,"Period closed", c.name+" — "+period+" archived; board reset for new period");
  settingsOpen[ci]=false; render(); queueSave();
  alert("Archived. \""+c.name+"\" is reset for the new period — history is under DONE → Archive.");
}
function togglePillar(ci,pi){ pillarOpen[ci+"-"+pi]=!pillarOpen[ci+"-"+pi]; render(); }
function cycleStatus(ci,pi){
  const el=CLIENTS[ci].p[PILLARS[pi]];
  el.status=STATUS[(STATUS.indexOf(el.status)+1)%STATUS.length];
  logEvent(ME,"Status", CLIENTS[ci].name+" — "+PILLARS[pi]+" → "+el.status);
  render(); queueSave();
}
function cycleWho(ci,pi){
  const el=CLIENTS[ci].p[PILLARS[pi]];
  el.who=PEOPLE[(PEOPLE.indexOf(el.who)+1)%PEOPLE.length];
  logEvent(ME,"Assignee", CLIENTS[ci].name+" — "+PILLARS[pi]+" → "+el.who);
  render(); queueSave();
}
function setDue(ci,pi,v){
  CLIENTS[ci].p[PILLARS[pi]].due=v||"";
  logEvent(ME,"Due date", CLIENTS[ci].name+" — "+PILLARS[pi]+(v?" → "+v:" cleared"));
  pillarOpen[ci+"-"+pi]=true; render(); queueSave();
}
function showReply(id){ replyOpen[id]=!replyOpen[id]; render(); }

/* ===== alert interactions ===== */
function toggleFlag(ci,pi,id){
  const n=findNode(CLIENTS[ci].p[PILLARS[pi]].comments,id); n.flag=!n.flag;
  logEvent(ME, n.flag?"Flagged":"Resolved", CLIENTS[ci].name+" — "+PILLARS[pi]+": "+summarize(n.text));
  render(); queueSave();
}
function resolveFlag(ci,pi,id){
  const n=findNode(CLIENTS[ci].p[PILLARS[pi]].comments,id);
  if(n){ n.flag=false; logEvent(ME,"Resolved", CLIENTS[ci].name+" — "+PILLARS[pi]+": "+summarize(n.text)); }
  render(); queueSave();
}
function jumpTo(ci,pi,id){
  if(VIEW!=="board") setView("board");          // alerts on Dashboard now land you on the Board
  clientOpen[ci]=true; pillarOpen[ci+"-"+pi]=true; render();
  setTimeout(()=>{ const el=document.getElementById("cmt-"+id);
    if(el){ el.scrollIntoView({behavior:"smooth",block:"center"}); el.style.transition="background .3s";
      const old=el.style.background; el.style.background="rgba(240,160,32,.25)";
      setTimeout(()=>{ el.style.background=old; },900); } },70);
}
function scrollAlerts(){ document.getElementById("alerts").scrollIntoView({behavior:"smooth",block:"start"}); }

function nowStr(){ const d=new Date();
  return d.toLocaleDateString('en-GB',{day:'2-digit',month:'short'})+", "+d.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'}); }
function addComment(ci,pi){
  const el=document.getElementById("ac-"+ci+"-"+pi), v=(el.value||"").trim(); if(!v)return;
  CLIENTS[ci].p[PILLARS[pi]].comments.push({id:nextCid++,who:ME,when:nowStr(),text:v,flag:isInstruction(v),replies:[]});
  logEvent(ME,"Comment", CLIENTS[ci].name+" — "+PILLARS[pi]);
  pillarOpen[ci+"-"+pi]=true; render(); queueSave();
}
function addReply(ci,pi,id){
  const el=document.getElementById("rp-"+id), v=(el.value||"").trim(); if(!v)return;
  const node=findNode(CLIENTS[ci].p[PILLARS[pi]].comments,id);
  node.replies.push({id:nextCid++,who:ME,when:nowStr(),text:v,flag:isInstruction(v),replies:[]});
  replyOpen[id]=false; render(); queueSave();
}

/* ===== comment delete (soft) + undo ===== */
let undoTimer=null;
function showUndoToast(msg, onUndo){
  const el=document.getElementById("undoToast");
  clearTimeout(undoTimer);
  el.innerHTML='<span>'+escHtml(msg)+'</span><button id="undoBtn">Undo</button>';
  el.classList.add("show");
  document.getElementById("undoBtn").onclick=function(){
    clearTimeout(undoTimer);
    el.classList.remove("show");
    onUndo();
  };
  undoTimer=setTimeout(()=>{ el.classList.remove("show"); },6000);
}
function askDeleteComment(ci,pi,id){
  delConfirmOpen[id]=true;
  render();
  clearTimeout(delConfirmTimer[id]);
  delConfirmTimer[id]=setTimeout(()=>{ delConfirmOpen[id]=false; render(); },5000);
}
function confirmDeleteNo(ci,pi,id){
  clearTimeout(delConfirmTimer[id]);
  delConfirmOpen[id]=false;
  render();
}
function confirmDeleteYes(ci,pi,id){
  clearTimeout(delConfirmTimer[id]);
  delConfirmOpen[id]=false;
  const node=findNode(CLIENTS[ci].p[PILLARS[pi]].comments,id);
  if(!node) return;
  node.deleted=true;
  logEvent(ME,"Comment deleted", CLIENTS[ci].name+" — "+PILLARS[pi]+": "+summarize(node.text));
  render(); queueSave();
  showUndoToast("Comment deleted", ()=>restoreComment(ci,pi,id));
}
function restoreComment(ci,pi,id){
  const node=findNode(CLIENTS[ci].p[PILLARS[pi]].comments,id);
  if(!node) return;
  node.deleted=false;
  logEvent(ME,"Comment restored", CLIENTS[ci].name+" — "+PILLARS[pi]+": "+summarize(node.text));
  pillarOpen[ci+"-"+pi]=true; render(); queueSave();
}
render();
showConnect();
if(SCRIPT_URL) loadRemote();
</script>
